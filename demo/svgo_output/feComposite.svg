<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="330" height="195" viewBox="0 0 1100 650"><title>Example feComposite - Examples of feComposite operations</title><desc>Four rows of six pairs of overlapping triangles depicting
        the six different feComposite operators under different
        opacity values and different clearing of the background.</desc><defs><filter id="f" width="110%" height="110%" x="-5%" y="-5%" filterUnits="objectBoundingBox"><feFlood flood-color="#fff" flood-opacity="1" result="flood"/><feComposite in="SourceGraphic" in2="BackgroundImage" result="comp"/><feMerge><feMergeNode in="flood"/><feMergeNode in="comp"/></feMerge></filter><filter id="h" width="110%" height="110%" x="-5%" y="-5%" filterUnits="objectBoundingBox"><feFlood flood-color="#fff" flood-opacity="1" result="flood"/><feComposite in="SourceGraphic" in2="BackgroundImage" operator="in" result="comp"/><feMerge><feMergeNode in="flood"/><feMergeNode in="comp"/></feMerge></filter><filter id="i" width="110%" height="110%" x="-5%" y="-5%" filterUnits="objectBoundingBox"><feFlood flood-color="#fff" flood-opacity="1" result="flood"/><feComposite in="SourceGraphic" in2="BackgroundImage" operator="out" result="comp"/><feMerge><feMergeNode in="flood"/><feMergeNode in="comp"/></feMerge></filter><filter id="j" width="110%" height="110%" x="-5%" y="-5%" filterUnits="objectBoundingBox"><feFlood flood-color="#fff" flood-opacity="1" result="flood"/><feComposite in="SourceGraphic" in2="BackgroundImage" operator="atop" result="comp"/><feMerge><feMergeNode in="flood"/><feMergeNode in="comp"/></feMerge></filter><filter id="k" width="110%" height="110%" x="-5%" y="-5%" filterUnits="objectBoundingBox"><feFlood flood-color="#fff" flood-opacity="1" result="flood"/><feComposite in="SourceGraphic" in2="BackgroundImage" operator="xor" result="comp"/><feMerge><feMergeNode in="flood"/><feMergeNode in="comp"/></feMerge></filter><filter id="l" width="110%" height="110%" x="-5%" y="-5%" filterUnits="objectBoundingBox"><feFlood flood-color="#fff" flood-opacity="1" result="flood"/><feComposite in="SourceGraphic" in2="BackgroundImage" k1=".5" k2=".5" k3=".5" k4=".5" operator="arithmetic" result="comp"/><feMerge><feMergeNode in="flood"/><feMergeNode in="comp"/></feMerge></filter><filter id="m" width="110%" height="110%" x="-5%" y="-5%" filterUnits="objectBoundingBox"><feComposite in="SourceGraphic" in2="BackgroundImage" result="comp"/></filter><filter id="n" width="110%" height="110%" x="-5%" y="-5%" filterUnits="objectBoundingBox"><feComposite in="SourceGraphic" in2="BackgroundImage" operator="in" result="comp"/></filter><filter id="o" width="110%" height="110%" x="-5%" y="-5%" filterUnits="objectBoundingBox"><feComposite in="SourceGraphic" in2="BackgroundImage" operator="out" result="comp"/></filter><filter id="p" width="110%" height="110%" x="-5%" y="-5%" filterUnits="objectBoundingBox"><feComposite in="SourceGraphic" in2="BackgroundImage" operator="atop" result="comp"/></filter><filter id="q" width="110%" height="110%" x="-5%" y="-5%" filterUnits="objectBoundingBox"><feComposite in="SourceGraphic" in2="BackgroundImage" operator="xor" result="comp"/></filter><filter id="r" width="110%" height="110%" x="-5%" y="-5%" filterUnits="objectBoundingBox"><feComposite in="SourceGraphic" in2="BackgroundImage" k1=".5" k2=".5" k3=".5" k4=".5" operator="arithmetic" result="comp"/></filter><path id="a" fill="#0ff" d="M0 0h100v100z"/><path id="e" fill="#f0f" d="M0 0v100L100 0z"/><path id="b" fill="#0ff" fill-opacity=".5" d="M0 125h100v100z"/><path id="g" fill="#f0f" fill-opacity=".5" d="M0 125v100l100-100z"/><g id="c"><use xlink:href="#a"/><use xlink:href="#b"/></g><g id="d"><use xlink:href="#c" transform="translate(275 25)"/><use xlink:href="#c" transform="translate(400 25)"/><use xlink:href="#c" transform="translate(525 25)"/><use xlink:href="#c" transform="translate(650 25)"/><use xlink:href="#c" transform="translate(775 25)"/><use xlink:href="#c" transform="translate(900 25)"/></g></defs><path fill="none" stroke="#00f" d="M1 1h1098v648H1z"/><g font-family="Verdana" font-size="40" shape-rendering="crispEdges"><desc>Render the examples using the filters that draw on top of
          an opaque white surface, thus obliterating the background.</desc><text x="15" y="75">opacity 1.0</text><text x="15" y="115" font-size="27">(with feFlood)</text><text x="15" y="200">opacity 0.5</text><text x="15" y="240" font-size="27">(with feFlood)</text><use xlink:href="#d"/><g transform="translate(275 25)"><use xlink:href="#e" filter="url(#f)"/><use xlink:href="#g" filter="url(#f)"/><text x="5" y="275">over</text></g><g transform="translate(400 25)"><use xlink:href="#e" filter="url(#h)"/><use xlink:href="#g" filter="url(#h)"/><text x="35" y="275">in</text></g><g transform="translate(525 25)"><use xlink:href="#e" filter="url(#i)"/><use xlink:href="#g" filter="url(#i)"/><text x="15" y="275">out</text></g><g transform="translate(650 25)"><use xlink:href="#e" filter="url(#j)"/><use xlink:href="#g" filter="url(#j)"/><text x="10" y="275">atop</text></g><g transform="translate(775 25)"><use xlink:href="#e" filter="url(#k)"/><use xlink:href="#g" filter="url(#k)"/><text x="15" y="275">xor</text></g><g transform="translate(900 25)"><use xlink:href="#e" filter="url(#l)"/><use xlink:href="#g" filter="url(#l)"/><text x="-25" y="275">arithmetic</text></g><g transform="translate(0 325)"><desc>Render the examples using the filters that do not obliterate
          the background, thus sometimes causing the background to continue
          to appear in some cases, and in other cases the background
          image blends into itself (&quot;double-counting&quot;).</desc><text x="15" y="75">opacity 1.0</text><text x="15" y="115" font-size="27">(without feFlood)</text><text x="15" y="200">opacity 0.5</text><text x="15" y="240" font-size="27">(without feFlood)</text><use xlink:href="#d"/><g transform="translate(275 25)"><use xlink:href="#e" filter="url(#m)"/><use xlink:href="#g" filter="url(#m)"/><text x="5" y="275">over</text></g><g transform="translate(400 25)"><use xlink:href="#e" filter="url(#n)"/><use xlink:href="#g" filter="url(#n)"/><text x="35" y="275">in</text></g><g transform="translate(525 25)"><use xlink:href="#e" filter="url(#o)"/><use xlink:href="#g" filter="url(#o)"/><text x="15" y="275">out</text></g><g transform="translate(650 25)"><use xlink:href="#e" filter="url(#p)"/><use xlink:href="#g" filter="url(#p)"/><text x="10" y="275">atop</text></g><g transform="translate(775 25)"><use xlink:href="#e" filter="url(#q)"/><use xlink:href="#g" filter="url(#q)"/><text x="15" y="275">xor</text></g><g transform="translate(900 25)"><use xlink:href="#e" filter="url(#r)"/><use xlink:href="#g" filter="url(#r)"/><text x="-25" y="275">arithmetic</text></g></g></g></svg>