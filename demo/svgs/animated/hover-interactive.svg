<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <style>
    .btn { fill: #4285f4; cursor: pointer; }
    .btn:hover { fill: #ea4335; }
    .btn:active { fill: #fbbc05; }
    #ring { stroke: #34a853; stroke-width: 3; fill: none; }
    #ring:hover { stroke: #ea4335; stroke-width: 5; }
    circle.pulse { fill: #4285f4; }
    circle.pulse:hover { fill: #ff6d00; transform: scale(1.2); transform-origin: center; }
  </style>
  <rect class="btn" x="20" y="20" width="160" height="60" rx="12"/>
  <text x="100" y="58" text-anchor="middle" fill="white" font-size="18" font-family="sans-serif">Hover Me</text>
  <circle id="ring" cx="60" cy="140" r="30"/>
  <circle class="pulse" cx="140" cy="140" r="25"/>
</svg>
