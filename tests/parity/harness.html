<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>SVGym browser pipeline — parity harness</title>
<style>
  body { font: 14px/1.5 system-ui, sans-serif; max-width: 760px; margin: 2rem auto; padding: 0 1rem; }
  textarea { width: 100%; height: 180px; font-family: monospace; }
  #status { padding: .4rem .6rem; border-radius: 6px; background: #eee; display: inline-block; }
  pre { background: #f6f6f6; padding: .6rem; overflow: auto; }
</style>
</head>
<body>
  <h1>SVGym — local pipeline harness</h1>
  <p id="status">booting Pyodide + resvg…</p>

  <p>Everything runs locally in this tab. Paste an SVG, pick a level, optimize.</p>
  <textarea id="svg" placeholder="<svg …>…</svg>"></textarea>
  <p>
    <label>Level
      <select id="level">
        <option>lossless</option>
        <option selected>conservative</option>
        <option>aggressive</option>
      </select>
    </label>
    <button id="go" disabled>Optimize</button>
  </p>
  <pre id="out"></pre>

  <script type="module">
    import { initSvgym, runPipeline } from "./svgym-browser.js";
    const statusEl = document.getElementById("status");
    const go = document.getElementById("go");

    initSvgym().then(() => {
      statusEl.textContent = "ready — runs fully locally";
      go.disabled = false;
      // Signals + entry point that the Playwright runner (run_browser.mjs) uses.
      window.runPipeline = runPipeline;
      window.svgymReady = true;
    }).catch(e => {
      statusEl.textContent = "init failed: " + e;
      window.svgymError = String(e);
      console.error(e);
    });

    go.addEventListener("click", () => {
      const svg = document.getElementById("svg").value;
      const level = document.getElementById("level").value;
      const t0 = performance.now();
      const r = runPipeline(svg, level);
      const ms = Math.round(performance.now() - t0);
      document.getElementById("out").textContent =
        `size ${r.size} B   ssim ${r.ssim}   psnr ${r.psnr}   steps ${r.decisions.length}   ${ms} ms\n\n`
        + r.optimized_svg.slice(0, 4000);
    });
  </script>
</body>
</html>
